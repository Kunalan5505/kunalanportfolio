<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kunalan's Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="logo">Kunalan</div>
        <ul>
            <li><a href="#about">About Me</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#resume">Resume</a></li>
            <li><a href="#contact">Contact</a></li>
            <li><a href="#blog">Blog</a></li>
        </ul>
    </nav>

    <header class="hero glass">
        <h1>Hello, I'm Kunalan</h1>
        <p>Welcome to my portfolio!</p>
    </header>

    <section id="about" class="section glass">
        <h2>About Me</h2>
        <p>Brief bio goes here.</p>
    </section>

    <section id="projects" class="section glass">
        <h2>Projects</h2>
        <div class="project-list">
            <!-- Project cards go here -->
        </div>
    </section>

    <section id="resume" class="section glass">
        <h2>Resume</h2>
        <a href="assets/resume.pdf" target="_blank" class="button glass">Download Resume</a>
    </section>

    <section id="contact" class="section glass">
        <h2>Contact</h2>
        <form id="contactForm">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit" class="glass">Send</button>
        </form>
    </section>

    <section id="blog" class="section glass">
        <h2>Blog</h2>
        <div class="blog-list">
            <!-- Blog entries go here -->
        </div>
    </section>

    <footer class="glass">
        <p>&copy; 2026 Kunalan. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
